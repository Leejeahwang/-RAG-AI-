version: "3.8"

services:
  # LLM 추론 서버
  ollama:
    image: ollama/ollama:latest
    container_name: edge-saver-ollama
    # TODO: GPU 설정 (RPi에서는 제거)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 엣지 세이버 앱
  app:
    build: .
    container_name: edge-saver-app
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - .:/app
    # TODO: 포트 설정 (GUI 사용 시)
    # ports:
    #   - "8501:8501"

volumes:
  ollama_data:
